<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mediverse</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(120deg, #f5f5f5, #e0e0ff);
}

/* container */
.box {
  text-align: center;
}

/* logo */
.box img {
  width: 180px;
  margin-bottom: 20px;
}

/* title */
.box h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

/* button */
.btn {
  padding: 15px 40px;
  background: linear-gradient(45deg, #6a11cb, #2575fc);
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<div class="box">

  <!-- Logo -->
  <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png">

  <!-- Title -->
  <h1>Welcome to Mediverse 👨‍⚕️</h1>

  <!-- Button -->
  <button class="btn">ابدأ</button>

</div>

</body>
</html>
