<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neumorphic Button</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  /* هنا تختار اللون الثابت */
  background: #dfe6e9;

  font-family: Arial, sans-serif;
}

.image {
  width: 180px;
  height: 180px;
  object-fit: cover;
  margin-bottom: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

 

/* الزر (بدون أي تغيير) */
.neo-container {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 50px;
  background: #e6e6e6;

  box-shadow: 
    -8px -8px 15px rgba(255,255,255,0.9),
     8px 8px 15px rgba(0,0,0,0.15);
}

.text {
  padding: 15px 25px;
  border-radius: 40px;
  background: #e6e6e6;

  box-shadow: 
    -4px -4px 8px rgba(255,255,255,0.9),
     4px 4px 8px rgba(0,0,0,0.15);

  font-size: 20px;
}

.arrow-btn {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  background: #e6e6e6;

  box-shadow: 
    -4px -4px 8px rgba(255,255,255,0.9),
     4px 4px 8px rgba(0,0,0,0.15);

  font-size: 20px;
}

.arrow-btn:active {
  box-shadow: 
    inset -4px -4px 8px rgba(255,255,255,0.7),
    inset 4px 4px 8px rgba(0,0,0,0.2);
}
</style>

</head>
<body>

<!-- الشعار -->
<img class="logo" src="logo.png">

<!-- الزر -->
<div class="neo-container">
  <div class="text">Get Started</div>

  <button class="arrow-btn" onclick="goNext()">
    →
  </button>
</div>

<script>
function goNext() {
  window.location.href = "page2.html";
}
</script>

</body>
</html>
